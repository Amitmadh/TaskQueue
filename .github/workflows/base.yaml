name: Base

on:
  push:
    branches: [main]
  pull_request:

jobs:
  base:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Install
        run: uv sync --all-extras --dev
      - name: Base tests
        run: uv run pytest tests/test_base.py -v
